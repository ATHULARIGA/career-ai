{% extends "layout.html" %}
{% block content %}
<div style="max-width: 600px; margin: 60px auto; padding: 0 20px;">
    <div style="text-align: center; margin-bottom: 40px;">
        <h1 style="font-size: 2.25rem; font-weight: 800; color: #0f172a; margin-bottom: 12px;">1:1 Mentorship</h1>
        <p style="color: #64748b;">Book a live mock interview with an industry expert.</p>
    </div>

    <div style="background: white; padding: 40px; border-radius: 20px; border: 1px solid #e2e8f0; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05);">
        <form action="/schedule" method="post" style="display: flex; flex-direction: column; gap: 20px;">
            <div>
                <label style="display: block; font-size: 0.875rem; font-weight: 600; color: #475569; margin-bottom: 6px;">Full Name</label>
                <input name="name" placeholder="John Doe" required style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #e2e8f0; font-size: 1rem;">
            </div>
            
            <div>
                <label style="display: block; font-size: 0.875rem; font-weight: 600; color: #475569; margin-bottom: 6px;">Email Address</label>
                <input name="email" type="email" placeholder="john@example.com" required style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #e2e8f0; font-size: 1rem;">
            </div>

            <div>
                <label style="display: block; font-size: 0.875rem; font-weight: 600; color: #475569; margin-bottom: 6px;">Specialization</label>
                <select name="topic" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #e2e8f0; background: #f8fafc; font-size: 1rem;">
                    <option>Python Developer</option>
                    <option>Data Analyst (SQL)</option>
                    <option>Frontend Engineer (React)</option>
                    <option>Product Manager</option>
                </select>
            </div>

            <div>
                <label style="display: block; font-size: 0.875rem; font-weight: 600; color: #475569; margin-bottom: 6px;">Preferred Date & Time</label>
                <input type="datetime-local" name="datetime" required style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #e2e8f0; font-size: 1rem;">
            </div>

            <button type="submit" class="btn-primary" style="margin-top: 10px; border: none; cursor: pointer; padding: 16px;">Confirm Booking</button>
        </form>

        {% if link %}
        <div style="margin-top: 32px; padding: 24px; background: #eef2ff; border-radius: 12px; text-align: center; border: 1px solid #c7d2fe;">
            <p style="margin: 0 0 12px 0; font-weight: 600; color: #4338ca;">Booking Confirmed!</p>
            <p style="margin: 0 0 16px 0; font-size: 0.875rem; color: #6366f1;">Your meeting link is ready:</p>
            <a href="{{link}}" target="_blank" style="display: inline-block; background: #4f46e5; color: white; padding: 10px 20px; border-radius: 6px; text-decoration: none; font-weight: 500;">Join Meeting</a>
        </div>
        {% endif %}
    </div>
</div>
{% endblock %}
