{% extends "layout.html" %}
{% block content %}
<style>
  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     BASE LAYOUT & GLASSMORPHISM
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  html, body { 
    overflow-x: hidden; 
    height: 100%;
  }

  .auth-root {
    position: relative;
    min-height: calc(100vh - 70px);
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
    z-index: 2;
  }

  #auth-canvas {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    opacity: 0.85; /* Soft visual node lines */
  }

  /* ━━━━ FLOATING CARD (Notion/Pane Pane Style) ━━━━ */
  .auth-card {
    width: 100%;
    max-width: 440px;
    background: rgba(255, 255, 255, 0.88);
    backdrop-filter: blur(24px) saturate(180%);
    -webkit-backdrop-filter: blur(24px) saturate(180%);
    border: 1px solid rgba(255, 255, 255, 0.4);
    border-radius: 20px;
    padding: 44px 38px;
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.04), 
                0 1px 3px rgba(0, 0, 0, 0.02);
    animation: slide-up 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
    z-index: 3;
    transition: background 0.3s, border-color 0.3s;
  }

  .theme-dark .auth-card {
    background: rgba(18, 22, 33, 0.75);
    border-color: rgba(255, 255, 255, 0.06);
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3), 
                inset 0 1px 0 rgba(255, 255, 255, 0.03);
  }

  @keyframes slide-up {
    from { opacity: 0; transform: translateY(24px) scale(0.98); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* ━━━━ CARD HEADER CONTENT ━━━━ */
  .auth-header {
    text-align: center;
    margin-bottom: 34px;
    position: relative;
  }

  .floating-icon {
    font-size: 2.5rem;
    margin-bottom: 12px;
    display: inline-block;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.08));
    animation: icon-float 3s ease-in-out infinite;
  }

  @keyframes icon-float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }

  .auth-title {
    font-size: 1.75rem;
    font-weight: 800;
    color: #0f172a;
    letter-spacing: -0.04em;
    margin: 0 0 8px;
  }

  .theme-dark .auth-title {
    color: #f8fafc;
  }

  .auth-subtitle {
    font-size: 0.88rem;
    color: #64748b;
    margin: 0;
  }

  .auth-subtitle a {
    color: #6366f1;
    font-weight: 600;
    text-decoration: none;
  }

  .auth-subtitle a:hover {
    text-decoration: underline;
  }

  /* ━━━━ NOTION STYLE INPUTS ━━━━ */
  .af-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 18px;
  }

  .af-group label {
    font-size: 0.78rem;
    font-weight: 600;
    color: #475569;
    letter-spacing: 0.01em;
  }

  .theme-dark .af-group label {
    color: #94a3b8;
  }

  .af-input-wrap {
    position: relative;
  }

  .af-group input {
    width: 100%;
    padding: 12px 14px;
    border: 1.5px solid #e2e8f0;
    border-radius: 10px;
    font-size: 0.95rem;
    color: #0f172a;
    background: #f8fafc;
    transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    box-sizing: border-box;
  }

  .theme-dark .af-group input {
    background: rgba(30, 41, 59, 0.4);
    border-color: rgba(255, 255, 255, 0.08);
    color: #f1f5f9;
  }

  .af-group input::placeholder {
    color: #94a3b8;
  }

  .af-group input:focus {
    outline: none;
    border-color: #6366f1;
    background: #ffffff;
    box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
  }

  .theme-dark .af-group input:focus {
    background: rgba(30, 41, 59, 0.6);
    border-color: #6366f1;
  }

  .af-forgot-row {
    display: flex;
    justify-content: flex-end;
    margin: -12px 0 16px;
  }

  .af-forgot-row a {
    font-size: 0.78rem;
    color: #64748b;
    text-decoration: none;
    font-weight: 500;
    transition: color 0.15s;
  }

  .af-forgot-row a:hover {
    color: #6366f1;
  }

  /* ━━━━ FLAT MINIMAL CONTINUED BUTTON ━━━━ */
  .af-submit-btn {
    width: 100%;
    padding: 13.5px;
    border-radius: 11px;
    border: none;
    background: #0f172a;  /* Clean Notion/Linear Dark */
    color: #ffffff;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.01em;
    transition: transform 0.12s, box-shadow 0.15s, background 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    box-shadow: 0 4px 12px rgba(15, 23, 42, 0.12);
  }

  .theme-dark .af-submit-btn {
    background: #f8fafc;
    color: #0f172a;
    box-shadow: 0 4px 12px rgba(255, 255, 255, 0.05);
  }

  .af-submit-btn:hover {
    transform: translateY(-1px);
    background: #1e293b;
    box-shadow: 0 6px 16px rgba(15, 23, 42, 0.18);
  }

  .theme-dark .af-submit-btn:hover {
    background: #ffffff;
  }

  .af-submit-btn:active {
    transform: translateY(0);
  }

  /* Alerts */
  .af-alert {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.82rem;
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 20px;
    animation: slide-up 0.3s ease;
  }

  .af-alert-success {
    color: #065f46;
    background: rgba(52, 211, 153, 0.12);
    border: 1px solid rgba(52, 211, 153, 0.2);
  }

  .af-alert-error {
    color: #b91c1c;
    background: rgba(239, 68, 68, 0.08);
    border: 1px solid rgba(239, 68, 68, 0.15);
  }

  .af-foot {
    text-align: center;
    font-size: 0.82rem;
    color: #64748b;
    margin-top: 24px;
    border-top: 1px solid rgba(0,0,0,0.04);
    padding-top: 18px;
  }

  .theme-dark .af-foot {
    border-color: rgba(255,255,255,0.04);
  }

  .af-foot a {
    color: #6366f1;
    font-weight: 600;
    text-decoration: none;
  }

  .af-foot a:hover {
    text-decoration: underline;
  }

  /* Optional Back icon link */
  .back-to-site {
    position: absolute;
    top: 30px;
    left: 40px;
    font-size: 0.82rem;
    color: #64748b;
    text-decoration: none;
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 6px;
    color: inherit;
  }
  .back-to-site:hover {
    color: #6366f1;
  }

  @media (max-width: 480px) {
    .auth-card {
      padding: 30px 24px;
      margin: 10px;
    }
  }
</style>

<!-- Animated particle canvas fully visible in background layer -->
<canvas id="auth-canvas"></canvas>

<div class="auth-root">
  <a href="/" class="back-to-site">← Back to home</a>

  <div class="auth-card">
    <div class="auth-header">
      <span class="floating-icon">🎯</span>
      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-subtitle">
        New here? <a href="/signup">Create account for free</a>
      </p>
    </div>

    {% if message %}
    <div class="af-alert af-alert-success">✓ {{ message }}</div>
    {% endif %}
    {% if error %}
    <div class="af-alert af-alert-error">⚠ {{ error }}</div>
    {% endif %}

    <form method="post" action="/login" autocomplete="on">
      <input type="text" name="website" autocomplete="off" tabindex="-1" style="display:none">

      <div class="af-group">
        <label for="email">Email or Username</label>
        <input id="email" name="email" type="text"
               placeholder="you@example.com" autocomplete="username" required>
      </div>

      <div class="af-group">
        <label for="password">Password</label>
        <input id="password" name="password" type="password"
               placeholder="••••••••" autocomplete="current-password" required>
      </div>

      <div class="af-forgot-row">
        <a href="/forgot-password">Forgot password?</a>
      </div>

      <button class="af-submit-btn" type="submit">Sign In</button>
    </form>

    <div class="af-foot">
      Protected by visual node encryption layer.
    </div>
  </div>
</div>

<script>
/* ── Particle Canvas ── */
(function() {
  const canvas = document.getElementById("auth-canvas");
  const ctx = canvas.getContext("2d");
  const isDark = document.documentElement.classList.contains("theme-dark") || document.body.classList.contains("theme-dark");
  
  let W, H, particles = [], mouse = { x: -999, y: -999 };
  const N = 100; // slightly more node connected lines
  const COLOR = "rgba(99, 102, 241,"; // Indigo nodes

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function rnd(a, b) { return Math.random() * (b - a) + a; }

  function createParticle() {
    return {
      x: rnd(0, W), y: rnd(0, H),
      vx: rnd(-0.3, 0.3), vy: rnd(-0.3, 0.3),
      r: rnd(1.8, 3.8),
      alpha: rnd(0.2, 0.6),
      life: 1,
      decay: rnd(0.0008, 0.002),
    };
  }

  function init() {
    particles = Array.from({ length: N }, createParticle);
  }

  function drawHex(x, y, size, alpha) {
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
       const angle = (Math.PI / 6) + (Math.PI / 3) * i;
       if (i === 0) ctx.moveTo(x + size * Math.cos(angle), y + size * Math.sin(angle));
       else ctx.lineTo(x + size * Math.cos(angle), y + size * Math.sin(angle));
    }
    ctx.closePath();
    ctx.strokeStyle = COLOR + alpha + ")";
    ctx.lineWidth = 0.5;
    ctx.stroke();
  }

  function frame() {
    ctx.clearRect(0, 0, W, H);

    // Connecting lines (The Node Connection logic from Obsidian)
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const dist = Math.hypot(dx, dy);
        if (dist < 140) {
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.strokeStyle = COLOR + (0.16 * (1 - dist / 140)) + ")";
          ctx.lineWidth = 0.8;
          ctx.stroke();
        }
      }
    }

    particles.forEach((p, idx) => {
      const mdx = p.x - mouse.x, mdy = p.y - mouse.y, mdist = Math.hypot(mdx, mdy);
      if (mdist < 120) {
        p.vx += (mdx / mdist) * 0.05;
        p.vy += (mdy / mdist) * 0.05;
      }

      p.x += p.vx; p.y += p.vy;
      // Bounce walls
      if (p.x < 0 || p.x > W) p.vx *= -1;
      if (p.y < 0 || p.y > H) p.vy *= -1;

      p.life -= p.decay;
      if (p.life <= 0) { particles[idx] = createParticle(); return; }

      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = COLOR + (p.alpha * p.life) + ")";
      ctx.fill();

      if (p.r > 2.8) drawHex(p.x, p.y, p.r * 3.5, p.alpha * p.life * 0.4);
    });

    requestAnimationFrame(frame);
  }

  window.addEventListener("resize", () => { resize(); init(); });
  window.addEventListener("mousemove", e => { mouse.x = e.clientX; mouse.y = e.clientY; });

  resize(); init(); frame();
})();
</script>
{% endblock %}
