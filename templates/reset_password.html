{% extends "layout.html" %}
{% block content %}
<section class="al-page">
  <div class="al-card">
    <p class="al-eyebrow">Account Recovery</p>
    <h1>Set new password</h1>
    {% if error %}
    <p class="al-error">{{ error }}</p>
    {% endif %}
    <form class="al-form" method="post" action="/reset-password">
      <input type="hidden" name="token" value="{{ token }}">
      <input type="text" name="website" autocomplete="off" tabindex="-1" style="display:none">
      <label for="password">New password</label>
      <input id="password" name="password" type="password" placeholder="At least 8 chars, upper/lower/number" required>
      <label for="confirm_password">Confirm password</label>
      <input id="confirm_password" name="confirm_password" type="password" placeholder="Re-enter password" required>
      <button class="btn-primary" type="submit">Update password</button>
    </form>
    <p style="margin:12px 0 0;color:#6b7280;font-size:0.9rem;">Back to <a href="/login">Login</a></p>
  </div>
</section>
{% endblock %}
