{% extends "layout.html" %}
{% block content %}
<section class="al-page">
  <div class="al-card">
    <p class="al-eyebrow">Account Recovery</p>
    <h1>Reset password</h1>
    {% if message %}
    <p style="color:#065f46;background:#ecfdf5;border:1px solid #a7f3d0;border-radius:10px;padding:8px 10px;">{{ message }}</p>
    {% endif %}
    {% if error %}
    <p class="al-error">{{ error }}</p>
    {% endif %}
    <form class="al-form" method="post" action="/forgot-password">
      <input type="text" name="website" autocomplete="off" tabindex="-1" style="display:none">
      <label for="email">Email</label>
      <input id="email" name="email" type="email" placeholder="you@example.com" required>
      <button class="btn-primary" type="submit">Send reset link</button>
    </form>
    <p style="margin:12px 0 0;color:#6b7280;font-size:0.9rem;">Back to <a href="/login">Login</a></p>
  </div>
</section>
{% endblock %}
