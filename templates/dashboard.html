{% extends "layout.html" %}

{% block content %}
<div style="max-width: 800px; margin: 60px auto; padding: 0 20px;">
    <div style="background: white; border-radius: 20px; border: 1px solid #e2e8f0; overflow: hidden; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05);">
        <div style="background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%); padding: 40px; text-align: center; color: white;">
            <h1 style="margin: 0; font-size: 2rem; font-weight: 800;">Resume Analysis Result</h1>
            <p style="margin: 8px 0 0 0; opacity: 0.9;">AI-powered scoring and feedback</p>
        </div>
        
        <div style="padding: 40px;">
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 24px; margin-bottom: 40px;">
                {% for k,v in report.items() %}
                <div style="background: #f8fafc; padding: 24px; border-radius: 12px; border: 1px solid #f1f5f9;">
                    <div style="font-size: 0.75rem; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px;">{{k}}</div>
                    <div style="font-size: 1.25rem; font-weight: 700; color: #0f172a;">{{v}}</div>
                </div>
                {% endfor %}
            </div>

            <div style="border-top: 1px solid #f1f5f9; padding-top: 32px; text-align: center;">
                <h3 style="margin-bottom: 24px;">Next Step: Practice what you've improved</h3>
                <a href="/interview" class="btn-primary">Start Mock Interview →</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
