{% extends "layout.html" %}
{% block content %}
<div style="max-width: 1000px; margin: 60px auto; padding: 0 20px;">
    <h1 style="font-size: 2rem; font-weight: 800; color: #0f172a; margin-bottom: 32px;">Booking Dashboard</h1>
    
    <div style="background: white; border-radius: 16px; border: 1px solid #e2e8f0; overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);">
        <table style="width: 100%; border-collapse: collapse; text-align: left;">
            <thead>
                <tr style="background: #f8fafc; border-bottom: 1px solid #e2e8f0;">
                    <th style="padding: 16px 24px; font-weight: 600; color: #475569; font-size: 0.875rem; text-transform: uppercase; letter-spacing: 0.05em;">Name</th>
                    <th style="padding: 16px 24px; font-weight: 600; color: #475569; font-size: 0.875rem; text-transform: uppercase; letter-spacing: 0.05em;">Email</th>
                    <th style="padding: 16px 24px; font-weight: 600; color: #475569; font-size: 0.875rem; text-transform: uppercase; letter-spacing: 0.05em;">Topic</th>
                    <th style="padding: 16px 24px; font-weight: 600; color: #475569; font-size: 0.875rem; text-transform: uppercase; letter-spacing: 0.05em;">Date</th>
                    <th style="padding: 16px 24px; font-weight: 600; color: #475569; font-size: 0.875rem; text-transform: uppercase; letter-spacing: 0.05em;">Action</th>
                </tr>
            </thead>
            <tbody>
                {% for d in data %}
                <tr style="border-bottom: 1px solid #f1f5f9; transition: background 0.2s;" onmouseover="this.style.background='#f8fafc'" onmouseout="this.style.background='white'">
                    <td style="padding: 16px 24px; color: #1e293b; font-weight: 500;">{{ d[1] }}</td>
                    <td style="padding: 16px 24px; color: #64748b;">{{ d[2] }}</td>
                    <td style="padding: 16px 24px;">
                        <span style="background: #eef2ff; color: #4f46e5; padding: 4px 12px; border-radius: 999px; font-size: 0.75rem; font-weight: 600;">{{ d[3] }}</span>
                    </td>
                    <td style="padding: 16px 24px; color: #64748b;">{{ d[4] }}</td>
                    <td style="padding: 16px 24px;">
                        <a href="{{ d[5] }}" target="_blank" style="color: #4f46e5; font-weight: 600; text-decoration: none; font-size: 0.875rem;">Join Meeting</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
