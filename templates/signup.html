{% extends "layout.html" %}
{% block content %}
<style>
  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     BASE LAYOUT & GLASSMORPHISM
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  html, body { 
    overflow-x: hidden; 
    height: 100%;
  }

  .auth-root {
    position: relative;
    min-height: calc(100vh - 70px);
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
    z-index: 2;
  }

  #auth-canvas {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    opacity: 0.85;
  }

  /* ━━━━ FLOATING CARD (Notion/Pane Pane Style) ━━━━ */
  .auth-card {
    width: 100%;
    max-width: 460px;
    background: rgba(255, 255, 255, 0.88);
    backdrop-filter: blur(24px) saturate(180%);
    -webkit-backdrop-filter: blur(24px) saturate(180%);
    border: 1px solid rgba(255, 255, 255, 0.4);
    border-radius: 20px;
    padding: 44px 38px;
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.04), 
                0 1px 3px rgba(0, 0, 0, 0.02);
    animation: slide-up 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
    z-index: 3;
    transition: background 0.3s, border-color 0.3s;
  }

  .theme-dark .auth-card {
    background: rgba(18, 22, 33, 0.75);
    border-color: rgba(255, 255, 255, 0.06);
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3), 
                inset 0 1px 0 rgba(255, 255, 255, 0.03);
  }

  @keyframes slide-up {
    from { opacity: 0; transform: translateY(24px) scale(0.98); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* ━━━━ CARD HEADER CONTENT ━━━━ */
  .auth-header {
    text-align: center;
    margin-bottom: 30px;
    position: relative;
  }

  .floating-icon {
    font-size: 2.5rem;
    margin-bottom: 12px;
    display: inline-block;
    animation: icon-float 3s ease-in-out infinite;
  }

  @keyframes icon-float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }

  .auth-title {
    font-size: 1.75rem;
    font-weight: 800;
    color: #0f172a;
    letter-spacing: -0.04em;
    margin: 0 0 6px;
  }

  .theme-dark .auth-title {
    color: #f8fafc;
  }

  .auth-subtitle {
    font-size: 0.88rem;
    color: #64748b;
    margin: 0;
  }

  .auth-subtitle a {
    color: #10b981;
    font-weight: 600;
    text-decoration: none;
  }

  .auth-subtitle a:hover {
    text-decoration: underline;
  }

  /* ━━━━ NOTION STYLE INPUTS ━━━━ */
  .af-group {
    display: flex;
    flex-direction: column;
    gap: 5px;
    margin-bottom: 14px;
  }

  .af-group label {
    font-size: 0.78rem;
    font-weight: 600;
    color: #475569;
    letter-spacing: 0.01em;
  }

  .theme-dark .af-group label {
    color: #94a3b8;
  }

  .af-group input {
    width: 100%;
    padding: 11px 14px;
    border: 1.5px solid #e2e8f0;
    border-radius: 10px;
    font-size: 0.94rem;
    color: #0f172a;
    background: #f8fafc;
    transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    box-sizing: border-box;
  }

  .theme-dark .af-group input {
    background: rgba(30, 41, 59, 0.4);
    border-color: rgba(255, 255, 255, 0.08);
    color: #f1f5f9;
  }

  .af-group input::placeholder {
    color: #94a3b8;
  }

  .af-group input:focus {
    outline: none;
    border-color: #10b981;
    background: #ffffff;
    box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.08);
  }

  .theme-dark .af-group input:focus {
    background: rgba(30, 41, 59, 0.6);
    border-color: #10b981;
  }

  /* Password strength bar */
  .pw-strength-wrap {
    margin-top: 4px;
  }

  .pw-strength-bar {
    height: 4px;
    border-radius: 4px;
    background: #e2e8f0;
    overflow: hidden;
  }

  .pw-strength-fill {
    height: 100%;
    width: 0%;
    transition: width 0.3s, background 0.3s;
    border-radius: 4px;
  }

  .pw-strength-label {
    font-size: 0.73rem;
    color: #94a3b8;
    margin-top: 2px;
  }

  /* ━━━━ SUBMIT BUTTON ━━━━ */
  .af-submit-btn {
    width: 100%;
    padding: 13px;
    border-radius: 11px;
    border: none;
    background: #10b981; /* Green Notion/Linear style for Signup */
    color: #ffffff;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.01em;
    transition: transform 0.12s, box-shadow 0.15s, background 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    box-shadow: 0 4px 12px rgba(16, 185, 129, 0.15);
    margin-top: 8px;
  }

  .af-submit-btn:hover {
    transform: translateY(-1px);
    background: #059669;
    box-shadow: 0 6px 16px rgba(16, 185, 129, 0.22);
  }

  .af-submit-btn:active {
    transform: translateY(0);
  }

  /* Alerts */
  .af-alert {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.82rem;
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 20px;
    animation: slide-up 0.3s ease;
  }

  .af-alert-error {
    color: #b91c1c;
    background: rgba(239, 68, 68, 0.08);
    border: 1px solid rgba(239, 68, 68, 0.15);
  }

  /* Terms */
  .af-terms {
    font-size: 0.75rem;
    color: #64748b;
    text-align: center;
    margin-top: 14px;
    line-height: 1.5;
  }

  .af-terms a {
    color: #10b981;
    text-decoration: none;
  }

  .af-terms a:hover {
    text-decoration: underline;
  }

  .af-foot {
    text-align: center;
    font-size: 0.82rem;
    color: #64748b;
    margin-top: 18px;
    border-top: 1px solid rgba(0,0,0,0.04);
    padding-top: 16px;
  }

  .theme-dark .af-foot {
    border-color: rgba(255,255,255,0.04);
  }

  .af-foot a {
    color: #10b981;
    font-weight: 600;
    text-decoration: none;
  }

  .af-foot a:hover {
    text-decoration: underline;
  }

  @media (max-width: 480px) {
    .auth-card {
      padding: 30px 24px;
      margin: 10px;
    }
  }
</style>

<canvas id="auth-canvas"></canvas>

<div class="auth-root">
  <div class="auth-card">
    <div class="auth-header">
      <span class="floating-icon">🚀</span>
      <h1 class="auth-title">Get Started</h1>
      <p class="auth-subtitle">
        Already have an account? <a href="/login">Sign in</a>
      </p>
    </div>

    {% if error %}
    <div class="af-alert af-alert-error">⚠ {{ error }}</div>
    {% endif %}

    <form method="post" action="/signup" autocomplete="on" id="signup-form">
      <input type="text" name="website" autocomplete="off" tabindex="-1" style="display:none">

      <div class="af-group">
        <label for="full_name">Full Name</label>
        <input id="full_name" name="full_name" type="text" placeholder="Alex Johnson" autocomplete="name" required>
      </div>

      <div class="af-group">
        <label for="email">Email Address</label>
        <input id="email" name="email" type="email" placeholder="you@example.com" autocomplete="email" required>
      </div>

      <div class="af-group">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" placeholder="At least 6 characters" autocomplete="new-password" required minlength="6">
        <div class="pw-strength-wrap">
          <div class="pw-strength-bar"><div class="pw-strength-fill" id="pw-fill"></div></div>
          <div class="pw-strength-label" id="pw-label">Enter a password</div>
        </div>
      </div>

      <div class="af-group">
        <label for="confirm_password">Confirm Password</label>
        <input id="confirm_password" name="confirm_password" type="password" placeholder="Re-enter password" autocomplete="new-password" required>
      </div>

      <button class="af-submit-btn" type="submit">Create Free Account</button>
    </form>

    <p class="af-terms">
      By creating an account you agree to our 
      <a href="/terms">Terms</a> & <a href="/privacy">Privacy</a>.
    </p>

    <div class="af-foot">
      Protected by visual node encryption layer.
    </div>
  </div>
</div>

<script>
/* ── Password Strength Indicator ── */
(function() {
  const pw = document.getElementById("password");
  const fill = document.getElementById("pw-fill");
  const label = document.getElementById("pw-label");
  if (!pw) return;

  const levels = [
    { score: 0,  pct:  0,  color: "#e2e8f0", text: "Enter a password" },
    { score: 1,  pct: 25,  color: "#ef4444", text: "Weak" },
    { score: 2,  pct: 50,  color: "#f59e0b", text: "Fair" },
    { score: 3,  pct: 75,  color: "#3b82f6", text: "Good" },
    { score: 4,  pct: 100, color: "#10b981", text: "Strong 💪" },
  ];

  function score(v) {
    let s = 0;
    if (v.length >= 6) s++;
    if (v.length >= 10) s++;
    if (/[A-Z]/.test(v) && /[a-z]/.test(v)) s++;
    if (/[^A-Za-z0-9]/.test(v) || /\d/.test(v)) s++;
    return Math.min(s, 4);
  }

  pw.addEventListener("input", () => {
    const s = score(pw.value);
    const lv = levels[s];
    fill.style.width = lv.pct + "%";
    fill.style.background = lv.color;
    label.textContent = lv.text;
  });
})();

/* ── Confirm password live check ── */
(function() {
  const pw = document.getElementById("password");
  const cpw = document.getElementById("confirm_password");
  if (!pw || !cpw) return;
  cpw.addEventListener("input", () => {
    cpw.setCustomValidity(cpw.value !== pw.value ? "Passwords do not match" : "");
  });
})();

/* ── Particle Canvas ── */
(function() {
  const canvas = document.getElementById("auth-canvas");
  const ctx = canvas.getContext("2d");
  const COLOR_R = 16, COLOR_G = 185, COLOR_B = 129; // Green nodes for Signup

  let W, H, particles = [], mouse = { x: -999, y: -999 };
  const N = 90;

  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }

  function rnd(a, b) { return Math.random() * (b - a) + a; }

  function mkp() {
    return { x: rnd(0, W), y: rnd(0, H), vx: rnd(-0.3, 0.3), vy: rnd(-0.3, 0.3), r: rnd(1.8, 3.8), alpha: rnd(0.2, 0.5), life: 1, decay: rnd(0.0008, 0.002) };
  }

  function init() { particles = Array.from({ length: N }, mkp); }

  function rgba(a) { return `rgba(${COLOR_R},${COLOR_G},${COLOR_B},${a})`; }

  function frame() {
    ctx.clearRect(0, 0, W, H);

    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x, dy = particles[i].y - particles[j].y;
        const dist = Math.hypot(dx, dy);
        if (dist < 140) {
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.strokeStyle = rgba(0.18 * (1 - dist / 140));
          ctx.lineWidth = 0.8; ctx.stroke();
        }
      }
    }

    particles.forEach((p, idx) => {
      const mdx = p.x - mouse.x, mdy = p.y - mouse.y, md = Math.hypot(mdx, mdy);
      if (md < 100) { p.vx += (mdx / md) * 0.06; p.vy += (mdy / md) * 0.06; }
      p.x += p.vx; p.y += p.vy;
      if (p.x < 0 || p.x > W) p.vx *= -1;
      if (p.y < 0 || p.y > H) p.vy *= -1;
      p.life -= p.decay;
      if (p.life <= 0) { particles[idx] = mkp(); return; }
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = rgba(p.alpha * p.life);
      ctx.fill();
    });

    requestAnimationFrame(frame);
  }

  window.addEventListener("resize", () => { resize(); init(); });
  window.addEventListener("mousemove", e => { mouse.x = e.clientX; mouse.y = e.clientY; });
  resize(); init(); frame();
})();
</script>
{% endblock %}
