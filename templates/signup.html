{% extends "layout.html" %}
{% block content %}
<section class="al-page">
  <div class="al-card">
    <p class="al-eyebrow">Get Started</p>
    <h1>Create account</h1>
    {% if error %}
    <p class="al-error">{{ error }}</p>
    {% endif %}
    <form class="al-form" method="post" action="/signup">
      <input type="text" name="website" autocomplete="off" tabindex="-1" style="display:none">
      <label for="full_name">Full name</label>
      <input id="full_name" name="full_name" type="text" placeholder="Your name" required>

      <label for="email">Email</label>
      <input id="email" name="email" type="email" placeholder="you@example.com" required>

      <label for="password">Password</label>
      <input id="password" name="password" type="password" placeholder="At least 6 characters" required>

      <label for="confirm_password">Confirm password</label>
      <input id="confirm_password" name="confirm_password" type="password" placeholder="Re-enter password" required>

      <button class="btn-primary" type="submit">Create account</button>
    </form>
    <p style="margin:12px 0 0;color:#6b7280;font-size:0.9rem;">Already have an account? <a href="/login">Login</a></p>
  </div>
</section>
{% endblock %}
